<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Input Transaksi - Keuangan</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="style.css">
    <script>
        // Auth Check
        if (!localStorage.getItem('user')) {
            window.location.href = 'login.html';
        }
    </script>
    <style>
        .max-width-1140 { max-width: 1140px; margin: auto; }
        .table th { font-size: 0.85rem; text-transform: uppercase; letter-spacing: 0.5px; }
        
        /* Specific overrides for this page if needed */
        body { padding-top: 20px; }
        .back-btn {
            position: fixed;
            top: 20px;
            left: 20px;
            z-index: 1001;
            border-radius: 12px;
            padding: 10px 20px;
            box-shadow: var(--card-shadow);
        }
    </style>
</head>
<body class="bg-light">
    <a href="index.html" class="btn btn-danger back-btn">
       <i class="bi bi-arrow-left me-2"></i> Dashboard
    </a>
    
    <!-- Theme Toggle Floating for this page -->
    <button id="themeToggle" class="btn btn-link position-fixed" onclick="toggleTheme()" style="top: 20px; right: 20px; z-index: 1001; color: var(--text-muted); background: var(--bg-card); border-radius: 12px; border: 1px solid var(--border-color); width: 45px; height: 45px; display: flex; align-items: center; justify-content: center;">
        <i class="bi bi-moon-stars"></i>
    </button>
    <div class="container py-5 max-width-1140">
        <div class="text-center mb-5">
            <h1 class="sidebar-title d-inline-block fs-1">Detail Transaction</h1>
            <p class="text-muted">Kelola data pemasukan dan pengeluaran Anda dengan mudah</p>
        </div>

        <!-- 💰 Summary Cards -->
        <div class="row g-3 mb-4">
            <div class="col-md-3 col-6">
                <div class="balance-card h-100 balance-opening">
                    <div class="balance-icon"><i class="bi bi-wallet"></i></div>
                    <small>Opening</small>
                    <h3 id="openingBalance">Rp 0</h3>
                </div>
            </div>
            <div class="col-md-3 col-6">
                <div class="balance-card h-100 balance-masuk">
                    <div class="balance-icon"><i class="bi bi-arrow-down-circle"></i></div>
                    <small>Pemasukan</small>
                    <h3 id="totalMasuk">Rp 0</h3>
                </div>
            </div>
            <div class="col-md-3 col-6">
                <div class="balance-card h-100 balance-keluar">
                    <div class="balance-icon"><i class="bi bi-arrow-up-circle"></i></div>
                    <small>Pengeluaran</small>
                    <h3 id="totalKeluar">Rp 0</h3>
                </div>
            </div>
            <div class="col-md-3 col-6">
                <div class="balance-card h-100 balance-ending">
                    <div class="balance-icon"><i class="bi bi-bank"></i></div>
                    <small>Ending</small>
                    <h3 id="endingBalance">Rp 0</h3>
                </div>
            </div>
        </div>

        <!-- 📝 Input Form -->
        <div class="card mb-4">
            <div class="card-header border-0 bg-transparent pt-4 px-4">
                <h5 class="fw-bold m-0 text-primary"><i class="bi bi-plus-circle me-2"></i> Input Transaksi Baru</h5>
            </div>
            <div class="card-body p-4">
                <div class="row g-3">
                    <div class="col-md-2">
                        <label class="form-label fw-bold small">Tanggal</label>
                        <input type="date" id="tanggal" class="form-control">
                    </div>
                    <div class="col-md-2">
                        <label class="form-label fw-bold small">Jenis</label>
                        <select id="jenis" class="form-select">
                            <option value="Masuk">Pemasukan</option>
                            <option value="Keluar">Pengeluaran</option>
                        </select>
                    </div>
                    <div class="col-md-3 position-relative">
                        <label class="form-label fw-bold small">Kategori</label>
                        <input type="text" id="kategori" class="form-control" list="kategoriList" placeholder="Pilih/Tambah">
                        <datalist id="kategoriList"></datalist>
                        <div id="kategoriSuggestions" class="suggestions"></div>
                    </div>
                    <div class="col-md-2">
                        <label class="form-label fw-bold small">Jumlah (Rp)</label>
                        <input type="text" id="jumlah" class="form-control" placeholder="0">
                    </div>
                    <div class="col-md-3">
                        <label class="form-label fw-bold small">Keterangan</label>
                        <input type="text" id="keterangan" class="form-control" placeholder="Opsional">
                    </div>
                    <div class="col-12 d-flex gap-2 mt-4">
                        <button id="btnSimpan" class="btn btn-primary px-4 py-2" onclick="simpan()">
                            <i class="bi bi-save me-2"></i> Simpan Transaksi
                        </button>
                        <button class="btn btn-outline-secondary px-4 py-2" onclick="resetForm()">
                            <i class="bi bi-arrow-counterclockwise me-2"></i> Reset
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <!-- 🔍 Filter & Daftar Transaksi -->
        <div id="sectionTransaksi" class="card border-0 shadow-sm mb-4">
            <div class="card-header border-0 bg-transparent pt-4 px-4">
                <div class="d-flex justify-content-between align-items-center flex-wrap gap-2">
                    <h5 class="fw-bold mb-0 text-primary"><i class="bi bi-table me-2"></i> Daftar Transaksi <span id="transactionCount" class="badge bg-secondary ms-2">0</span></h5>
                    <div class="d-flex gap-2 align-items-end">
                        <div style="min-width: 130px;">
                            <label class="form-label small fw-bold mb-1">📅 Bulan</label>
                            <select id="filterBulan" class="form-select form-select-sm">
                                <option value="">Semua Bulan</option>
                                <option value="01">Januari</option><option value="02">Februari</option>
                                <option value="03">Maret</option><option value="04">April</option>
                                <option value="05">Mei</option><option value="06">Juni</option>
                                <option value="07">Juli</option><option value="08">Agustus</option>
                                <option value="09">September</option><option value="10">Oktober</option>
                                <option value="11">November</option><option value="12">Desember</option>
                            </select>
                        </div>
                        <div style="min-width: 100px;">
                            <label class="form-label small fw-bold mb-1">📆 Tahun</label>
                            <select id="filterTahun" class="form-select form-select-sm"></select>
                        </div>
                        <button class="btn btn-primary btn-sm px-3" onclick="loadData()">Tampilkan</button>
                    </div>
                </div>
            </div>
            <div class="card-body p-0">
                <div id="loadingTable" class="text-center py-4" style="display:none;">
                    <div class="spinner-border spinner-border-sm text-primary"></div> Memuat data...
                </div>
                <div class="table-responsive">
                    <table class="table table-hover align-middle mb-0">
                        <thead>
                            <tr><th>Tanggal</th><th>Jenis</th><th>Kategori</th><th class="text-end">Jumlah</th><th>Ket</th><th class="text-end">Saldo</th><th class="text-center">Aksi</th></tr>
                        </thead>
                        <tbody id="tabelTransaksi">
                            <tr><td colspan="7" class="text-center text-muted py-3">Klik "Tampilkan" untuk memuat data</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
