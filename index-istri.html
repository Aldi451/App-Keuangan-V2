<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Dashboard Keuangan Keluarga</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">

    <!-- Supabase -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <!-- Custom CSS -->
    <link rel="stylesheet" href="style-istri.css">
</head>

<body>

    <!-- HEADER -->
    <header class="top-header">
        <div class="greeting">
            <h1>Halo, Istriku ❤️</h1>
            <p>Berikut ringkasan keuangan kita</p>
        </div>

        <div class="header-icon">
            <i class="bi bi-wallet2 text-primary fs-2"></i>
        </div>
    </header>

    <!-- FILTER BULAN & TAHUN -->
    <div class="filter-section mt-4">

        <!-- Bulan -->
        <select id="filterBulan"
                class="filter-select"
                onchange="loadDashboardData()">

            <option value="01">Januari</option>
            <option value="02">Februari</option>
            <option value="03">Maret</option>
            <option value="04">April</option>
            <option value="05">Mei</option>
            <option value="06">Juni</option>
            <option value="07">Juli</option>
            <option value="08">Agustus</option>
            <option value="09">September</option>
            <option value="10">Oktober</option>
            <option value="11">November</option>
            <option value="12">Desember</option>

        </select>

        <!-- Tahun -->
        <select id="filterTahun"
                class="filter-select"
                onchange="loadDashboardData()">

            <!-- Generate via JavaScript -->

        </select>

    </div>

    <!-- SUMMARY -->
    <div class="summary-container">

        <!-- SALDO AKHIR -->
        <div class="card-istri bg-saldo">

            <div class="card-icon">
                <i class="bi bi-wallet2"></i>
            </div>

            <div class="card-content">
                <small>Saldo Akhir</small>
                <h3 id="totSaldo">Rp 0</h3>
            </div>

        </div>

        <!-- RINGKASAN PEMASUKAN & PENGELUARAN -->
        <div class="row g-3 mt-1">

            <!-- PEMASUKAN -->
            <div class="col-6">

                <div class="card-istri bg-masuk p-3">

                    <div class="card-content">
                        <small>Total Pemasukan</small>

                        <h3 id="totPemasukan"
                            class="fs-5 mt-1">

                            Rp 0

                        </h3>
                    </div>

                </div>

            </div>

            <!-- PENGELUARAN -->
            <div class="col-6">

                <div class="card-istri bg-keluar p-3">

                    <div class="card-content">
                        <small>Total Pengeluaran</small>

                        <h3 id="totPengeluaran"
                            class="fs-5 mt-1">

                            Rp 0

                        </h3>
                    </div>

                </div>

            </div>

        </div>

        <!-- INFO PERHITUNGAN -->
        <div class="alert alert-light border mt-3 small text-center">

            <i class="bi bi-info-circle"></i>

            Saldo Akhir =
            Saldo Bulan Lalu +
            Pemasukan -
            Pengeluaran

        </div>

    </div>

    <!-- RIWAYAT TRANSAKSI -->
    <div class="trx-list">

        <h3 class="trx-list-header">
            Riwayat Transaksi
        </h3>

        <div id="trxContainer">

            <!-- Loading -->
            <div class="text-center py-4">

                <div class="spinner-border text-primary"
                     role="status">

                </div>

            </div>

        </div>

    </div>

    <!-- FLOATING BUTTON -->
    <div class="fab-container">

        <a href="input-transaction.html"
           class="fab">

            <i class="bi bi-plus"></i>

        </a>

    </div>

    <!-- JS -->
    <script src="auth.js"></script>
    <script src="script-istri.js"></script>

</body>
</html>
