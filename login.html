<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Keuangan</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="style.css">
</head>
<body class="auth-page">
    <div class="auth-card">
        <div class="auth-header">
            <div class="auth-logo">
                <i class="bi bi-wallet2"></i>
            </div>
            <h1 class="auth-title">Selamat Datang</h1>
            <p class="auth-subtitle">Masuk ke akun Anda untuk mengelola keuangan</p>
        </div>

        <div class="mb-3">
            <label class="form-label small fw-bold">Username</label>
            <div class="input-group">
                <span class="input-group-text bg-transparent border-end-0"><i class="bi bi-person text-muted"></i></span>
                <input type="text" id="username" class="form-control border-start-0 ps-0" placeholder="Username Anda">
            </div>
        </div>

        <div class="mb-4">
            <div class="d-flex justify-content-between align-items-center mb-1">
                <label class="form-label small fw-bold mb-0">Password</label>
                <a href="Forgot.html" class="small text-primary text-decoration-none">Lupa Password?</a>
            </div>
            <div class="input-group">
                <span class="input-group-text bg-transparent border-end-0"><i class="bi bi-lock text-muted"></i></span>
                <input type="password" id="password" class="form-control border-start-0 ps-0" placeholder="••••••••">
                <button class="btn btn-outline-secondary border-start-0" type="button" onclick="togglePassword('password')">
                    <i class="bi bi-eye"></i>
                </button>
            </div>
        </div>

        <button class="btn btn-primary w-100 py-2 fw-bold" onclick="login()">
            Masuk Sekarang <i class="bi bi-arrow-right ms-2"></i>
        </button>

        <div class="auth-footer">
            Belum punya akun? <a href="register.html">Daftar Gratis</a>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="auth.js"></script>
    <script>
        // Check if already logged in
        if(localStorage.getItem('user')) {
            window.location.href = 'index.html';
        }
    </script>
</body>
</html>
