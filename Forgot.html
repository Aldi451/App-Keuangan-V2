<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lupa Password - Keuangan</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="style.css">
</head>
<body class="auth-page">
    <div class="auth-card">
        <div class="auth-header">
            <div class="auth-logo" style="background: linear-gradient(135deg, #f59e0b 0%, #d97706 100%);">
                <i class="bi bi-key"></i>
            </div>
            <h1 class="auth-title">Reset Password</h1>
            <p class="auth-subtitle">Masukkan detail Anda untuk memulihkan akses akun</p>
        </div>

        <div class="mb-4">
            <label class="form-label small fw-bold">Email atau No. HP</label>
            <div class="input-group">
                <span class="input-group-text bg-transparent border-end-0"><i class="bi bi-envelope text-muted"></i></span>
                <input type="text" id="resetInput" class="form-control border-start-0 ps-0" placeholder="nama@email.com / 0812...">
            </div>
            <div class="form-text small mt-2">Kami akan mengirimkan instruksi pemulihan ke kontak Anda.</div>
        </div>

        <button class="btn btn-warning w-100 py-2 fw-bold text-white" onclick="lupaPassword()">
            Kirim Link Reset <i class="bi bi-send ms-2"></i>
        </button>

        <div class="auth-footer">
            Ingat password Anda? <a href="login.html">Kembali ke Login</a>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="auth.js"></script>
</body>
</html>
